name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: voidzero-dev/setup-vp@8ecb39174989ce55af90f45cf55b02738599831d # v1
        with:
          node-version: '22'
          cache: true

      - name: 🔠 Lint project
        run: vp run lint

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: voidzero-dev/setup-vp@8ecb39174989ce55af90f45cf55b02738599831d # v1
        with:
          node-version: '22'
          cache: true

      - name: 💪 Type check
        run: vp run test:types

      # - name: 🧪 Unit test
      #   run: vp run test:unit

      # - name: 🏃 Component tests
      #   run: vp run test:nuxt

